<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Trust Platform - Deepfake Detection</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🧠 AI Trust Platform</h1>
        <p class="subtitle">Detect deepfakes and verify content authenticity</p>

        <div class="section">
            <h2>📸 Image Analysis</h2>
            <div class="drop-zone" id="drop-zone">
                <div class="drop-zone-content">
                    <p>Drop image here or click to select</p>
                </div>
                <img id="preview" class="hidden" />
            </div>
            <input type="file" id="image-input" accept="image/*" style="display:none;">
            <button id="scan-image-btn" class="btn">Scan Image</button>
            <div id="image-result" class="result hidden">
                <p>Result: <span id="image-label"></span></p>
                <p>Confidence: <span id="image-confidence"></span>%</p>
                <div class="progress-bar">
                    <div id="image-progress" class="progress-fill"></div>
                </div>
            </div>
        </div>

        <div class="section">
            <h2>📝 Text Analysis</h2>
            <textarea id="text-input" placeholder="Paste text to analyze..."></textarea>
            <button id="scan-text-btn" class="btn">Scan Text</button>
            <div id="text-result" class="result hidden">
                <p>Result: <span id="text-label"></span></p>
                <p>Confidence: <span id="text-confidence"></span>%</p>
                <div class="progress-bar">
                    <div id="text-progress" class="progress-fill"></div>
                </div>
                <div id="text-sources-container" class="hidden">
                    <h4>Related News Sources:</h4>
                    <ul id="text-sources-list"></ul>
                </div>
            </div>
        </div>

        <div class="section">
            <h2>🔗 Source Check</h2>
            <input type="url" id="url-input" placeholder="Enter URL to check...">
            <button id="scan-url-btn" class="btn">Check Source</button>
            <div id="url-result" class="result hidden">
                <p>Status: <span id="url-status"></span></p>
                <p>Trust Score: <span id="url-score"></span>/100</p>
            </div>
        </div>

        <div class="section">
            <h2>📊 Combined Analysis</h2>
            <button id="analyze-btn" class="btn btn-primary">Analyze All</button>
            <pre id="output" class="output hidden"></pre>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
