<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Trust Platform | Premium Deepfake Detection</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🧠 AI Trust Platform</h1>
            <p class="subtitle">Next-generation neural analysis for verifying media authenticity and detecting AI-generated content.</p>
        </header>

        <main>
            <!-- Input Modules -->
            <div class="section">
                <h2>📸 Image Analysis</h2>
                <div class="drop-zone" id="drop-zone">
                    <div class="drop-zone-content">
                        <p>Drag & drop image or click to browse</p>
                        <small style="color: #64748b;">Supports JPG, PNG, WEBP</small>
                    </div>
                    <img id="preview" class="hidden" alt="Analysis preview" />
                </div>
                <input type="file" id="image-input" accept="image/*" style="display:none;">
                <div style="display: flex; gap: 10px; margin-top: 15px;">
                    <button id="scan-image-btn" class="btn" style="background: rgba(255,255,255,0.1); color: white;">Scan Image Only</button>
                </div>
            </div>

            <div class="section">
                <h2>📝 Text & Context Analysis</h2>
                <textarea id="text-input" placeholder="Paste article content or statements here..."></textarea>
                <input type="url" id="url-input" placeholder="Optional: Enter source URL for verification">
                
                <div style="display: flex; gap: 10px; margin-top: 10px;">
                    <button id="scan-text-btn" class="btn" style="background: rgba(255,255,255,0.1); color: white;">Scan Text Only</button>
                    <button id="scan-url-btn" class="btn" style="background: rgba(255,255,255,0.1); color: white;">Check URL Only</button>
                </div>
            </div>

            <!-- Main Action -->
            <div style="margin-bottom: 3rem;">
                <button id="analyze-btn" class="btn btn-primary">Run Full Neural Analysis</button>
            </div>

            <!-- Result Dashboard -->
            <div id="result-dashboard" class="section hidden">
                <h2>📊 Analysis Result</h2>
                <div id="analysis-output">
                    <!-- Dynamic Content -->
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
